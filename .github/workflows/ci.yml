name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      # swift-testing requires a full Xcode toolchain — available on GitHub
      # runners but NOT on Command Line Tools-only dev machines.
      - name: Test
        run: swift test
